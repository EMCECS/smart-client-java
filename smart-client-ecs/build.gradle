description = 'HostListProvider implementation for ECS'

dependencies {
    api project(':smart-client-core')
    api project(':smart-client-jersey')
    implementation 'org.slf4j:slf4j-api:2.0.16'
    implementation 'commons-codec:commons-codec:1.15'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.3'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.slf4j:slf4j-simple:2.0.16'
    testImplementation 'org.glassfish.jersey.connectors:jersey-apache-connector:3.1.5'
    testImplementation 'org.apache.httpcomponents.client5:httpclient5:5.3'
}

test {
    useJUnitPlatform()
}