description = 'Smart Client for Jersey 1.x - includes a SmartClientFactory'

dependencies {
    api project(':smart-client-core')
    api 'org.glassfish.jersey.core:jersey-client:2.41'
    implementation 'javax.ws.rs:javax.ws.rs-api:2.1.1'
    implementation 'org.slf4j:slf4j-api:1.7.36'
    implementation 'org.glassfish.jersey.connectors:jersey-apache-connector:2.41'
    implementation 'org.apache.httpcomponents:httpclient:4.5.14'
    implementation 'org.glassfish.jersey.media:jersey-media-json-jackson:2.41'
    implementation 'org.glassfish.jersey.media:jersey-media-jaxb:2.41'

    testImplementation 'junit:junit:4.13.2'
    testImplementation 'log4j:log4j:1.2.17'
}

test {
    useJUnit()
}
