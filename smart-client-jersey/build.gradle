description = 'Smart Client for Jersey 2.x - includes a SmartClientFactory'

dependencies {
    api project(':smart-client-core')
    api 'jakarta.ws.rs:jakarta.ws.rs-api:3.1.0'
    api 'jakarta.xml.bind:jakarta.xml.bind-api:4.0.0'
    api 'org.glassfish.jersey.core:jersey-client:3.1.5'
    implementation 'org.slf4j:slf4j-api:2.0.16'
    implementation 'org.glassfish.jersey.connectors:jersey-apache-connector:3.1.5'
    implementation 'org.apache.httpcomponents.client5:httpclient5:5.3'
    implementation 'org.glassfish.jersey.media:jersey-media-json-jackson:3.1.5'
    implementation 'org.glassfish.jersey.inject:jersey-hk2:3.1.5'
    implementation 'com.fasterxml.jackson.jaxrs:jackson-jaxrs-json-provider:2.18.2'
    implementation 'com.fasterxml.jackson.module:jackson-module-jaxb-annotations:2.18.2'
    implementation 'com.fasterxml.jackson.jakarta.rs:jackson-jakarta-rs-json-provider:2.18.2'
    runtimeOnly 'org.glassfish.jaxb:jaxb-runtime:4.0.2'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.3'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.slf4j:slf4j-simple:2.0.16'
}

test {
    useJUnitPlatform()
}
